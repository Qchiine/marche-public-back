spring.application.name=marches-backend
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# MongoDB (local by default, overridable via env var)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/marchesdb}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:marchesdb}
spring.data.mongodb.auto-index-creation=true

server.port=8080

# JWT
app.jwt.secret=${APP_JWT_SECRET:dev34-super-secret-key-change-me-at-least-32-characters}
app.jwt.access-expiration-ms=${APP_JWT_ACCESS_EXPIRATION_MS:3600000}
app.jwt.refresh-expiration-ms=${APP_JWT_REFRESH_EXPIRATION_MS:604800000}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Gemini API Configuration
gemini.api-key=AIzaSyBy7u6rfONk5hLrTzR63E2suY4o0LhnK8Y
gemini.model=gemini-1.5-flash

# JSP Configuration
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
