spring.application.name=marches-backend
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# MongoDB (local by default, overridable via env var)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/marchesdb}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:marchesdb}
spring.data.mongodb.auto-index-creation=true

server.port=8080

# JWT
app.jwt.secret=${APP_JWT_SECRET:dev34-super-secret-key-change-me-at-least-32-characters}
app.jwt.access-expiration-ms=${APP_JWT_ACCESS_EXPIRATION_MS:3600000}
app.jwt.refresh-expiration-ms=${APP_JWT_REFRESH_EXPIRATION_MS:604800000}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JSP Configuration
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Email Configuration (SMTP)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:aithalibi.yassmine@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:ddbw wbwy wztf dcbz}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
